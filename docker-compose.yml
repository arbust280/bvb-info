services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bvb
      POSTGRES_PASSWORD: bvb
      POSTGRES_DB: bvb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bvb"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      BVB_DATABASE_URL: postgresql+psycopg2://bvb:bvb@db:5432/bvb
      BVB_STORAGE_DIR: /app/storage
      BVB_LOG_LEVEL: INFO
    volumes:
      - ./storage:/app/storage
    # Run migrations then a full update.
    command: >
      sh -c "alembic upgrade head &&
             python -m bvb_scraper.main update-all --export storage/bvb_dataset.json"

volumes:
  pgdata:
